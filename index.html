<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lecture</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

#topbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 60px;
  background: white;
  display: flex;
  align-items: center;
  padding-left: 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  z-index: 10;
}

#content {
  margin-top: 80px;
  text-align: center;
}

#content img {
  max-width: 95%;
  height: auto;
  margin-bottom: 20px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

#loading {
  font-size: 18px;
  margin: 20px;
  color: #555;
}
</style>
</head>
<body>

<div id="topbar">
  <a href="index.html">← Retour</a>
</div>

<div id="content">
  <p id="loading">Chargement...</p>
</div>

<script>
const params = new URLSearchParams(window.location.search);
let chapitre = params.get("chapitre");

const content = document.getElementById("content");
const loading = document.getElementById("loading");

// 🔐 Sécurisation du paramètre (lettres, chiffres, tirets uniquement)
const regex = /^[a-zA-Z0-9_-]+$/;

if (!chapitre || !regex.test(chapitre)) {
  content.innerHTML = "<p>Chapitre invalide.</p>";
} else {

  let page = 1;

  function chargerPage() {
    const numero = String(page).padStart(4, "0");
    const imageUrl = "images/" + chapitre + "_page-" + numero + ".jpg";

    const img = new Image();
    img.src = imageUrl;

    img.onload = function() {
      content.insertBefore(img, loading);
      page++;
      chargerPage();
    };

    img.onerror = function() {
      if (page === 1) {
        loading.innerText = "Aucune image trouvée pour ce chapitre.";
      } else {
        loading.innerText = "Fin du chapitre.";
      }
    };
  }

  chargerPage();
}
</script>

</body>
</html>
