<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lecture</title>

<style>
body {
  margin: 0;
  background: #111;
  text-align: center;
  font-family: Arial, sans-serif;
  color: white;
}

#topbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 60px;
  background: #000;
  display: flex;
  align-items: center;
  padding-left: 20px;
  z-index: 10;
}

#topbar a {
  color: white;
  text-decoration: none;
}

#content {
  margin-top: 80px;
}

img {
  max-width: 95%;
  height: auto;
  margin-bottom: 20px;
  border-radius: 6px;
}
</style>
</head>
<body>

<div id="topbar">
  <a href="index.html">← Retour</a>
</div>

<div id="content"></div>

<script>
const params = new URLSearchParams(window.location.search);
const chapitre = params.get("chapitre");
const content = document.getElementById("content");

if (!chapitre) {
  content.innerHTML = "<p>Chapitre invalide.</p>";
} else {

  let page = 1;

  function chargerPage() {
    const numero = String(page).padStart(4, "0");
    const img = new Image();
    img.loading = "lazy";

    // CHEMIN CORRIGÉ ICI 👇
    img.src = "./" + chapitre + "_page-" + numero + ".jpg";

    img.onload = function() {
      content.appendChild(img);
      page++;
      chargerPage();
    };

    img.onerror = function() {
      if (page === 1) {
        content.innerHTML = "<p>Aucune image trouvée.</p>";
      }
    };
  }

  chargerPage();
}
</script>

</body>
</html>
